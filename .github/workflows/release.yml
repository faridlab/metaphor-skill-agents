name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # One leader job creates the empty GitHub Release so the per-target
  # upload jobs don't race on "who creates it first."
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: taiki-e/create-gh-release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  upload-assets:
    needs: create-release
    name: ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          # macOS: both targets build on an ARM runner. The x86_64 build is a
          # cross-compile via Apple's SDK, which Rust + clang handle natively.
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Upload binary
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: metaphor-agent
          target: ${{ matrix.target }}
          archive: metaphor-agent-$target
          token: ${{ secrets.GITHUB_TOKEN }}
